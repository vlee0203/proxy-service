name: Build and Push Image

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push image"
        required: false
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  APP_IMAGE: ghcr.io/vlee0203/proxy-service

# 用内置 GITHUB_TOKEN 推 ghcr，GitHub 会把 package 自动 link 到本仓库
# （用 PAT/GH_PAT 推不会 link，package 只出现在用户主页、不在仓库 Packages 里）。
permissions:
  contents: read
  packages: write

jobs:
  # 仅构建并推送 app 镜像（proxy-service 本体），multi-arch。
  # sealos 集群镜像不在 CI 构建，用 deploy/ 手动 sealos build（见 deploy/README.md）。
  build-app-image:
    name: Build app image (proxy-service)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: echo "tag=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.APP_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.tag.outputs.tag }},enable=true

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' || inputs.push_image == true }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
